name: Deploy Candle Run to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install deps
        working-directory: app
        run: npm ci

      - name: Build app (v0.4)
        working-directory: app
        run: npm run build

      - name: Include previous versions (backup) in the published site
        run: |
          mkdir -p app/dist/legacy
          # v0.3 (단일 파일 프로토타입)
          cp legacy/index-v0.3.html app/dist/legacy/index-v0.3.html
          # v0.4 / v0.5 (React 앱) — 자산은 저장소에서, 데이터는 동일하므로 공유 데이터 복사
          cp -r legacy/v0.4 app/dist/legacy/v0.4
          cp -r app/dist/data app/dist/legacy/v0.4/data
          cp -r legacy/v0.5 app/dist/legacy/v0.5
          cp -r app/dist/data app/dist/legacy/v0.5/data
          cp -r legacy/v0.6 app/dist/legacy/v0.6
          cp -r app/dist/data app/dist/legacy/v0.6/data

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
